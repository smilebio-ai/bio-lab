<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광합성 가상 실험실 - Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #0f172a; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .tube-liquid { background: linear-gradient(180deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0.4) 100%); }
        @keyframes bubble { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-120px); opacity: 0; } }
        .bubble-anim { animation: bubble 2s infinite ease-in; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SvgIcon = ({ type }) => {
            const icons = {
                beaker: <path d="M4.5 3h15M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3M6 14h12" />,
                plant: <path d="M12 22V12m0 0c-4-4-9-1-9-1s5 7 9 1c4 6 9 1 9 1s-5-3-9-1Z" />,
                flame: <path d="M12 2c0 0-2 4-2 7s2 5 2 5 2-2 2-5-2-7-2-7Z M12 22c4.4 0 8-3.6 8-8s-3.6-8-8-8-8 3.6-8 8 3.6 8 8 8Z" />,
                drop: <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5s-3 3.5-3 5.5a7 7 0 0 0 7 7z" />,
                play: <polygon points="5 3 19 12 5 21 5 3" />
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6">
                    {icons[type]}
                </svg>
            );
        };

        const App = () => {
            const [step, setStep] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const [dragged, setDragged] = useState(null);
            const [pos, setPos] = useState({ x: 0, y: 0 });
            const [status, setStatus] = useState({ a: false, b: false, foil: false, iodineA: false, iodineB: false });

            const steps = [
                { t: "1단계: 실험 준비", d: "검정말을 두 시험관에 넣고, 시험관 B는 호일로 감싸세요." },
                { t: "2단계: 기포 관찰", d: "빛을 받은 시험관 A에서 산소 기포가 발생하는지 확인하세요." },
                { t: "3단계: 결과 확인", d: "아이오딘 용액을 떨어뜨려 잎의 색 변화를 관찰하세요." }
            ];

            const onMove = (e) => {
                if (!isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                setPos({ x: clientX, y: clientY });
            };

            const onEnd = () => {
                if (!isDragging) return;
                const tubeA = document.getElementById('tube-a').getBoundingClientRect();
                const tubeB = document.getElementById('tube-b').getBoundingClientRect();
                const check = (r) => pos.x > r.left && pos.x < r.right && pos.y > r.top && pos.y < r.bottom;

                if (dragged === 'plant') {
                    if (check(tubeA)) setStatus(s => ({...s, a: true}));
                    if (check(tubeB)) setStatus(s => ({...s, b: true}));
                } else if (dragged === 'foil' && check(tubeB)) {
                    setStatus(s => ({...s, foil: true}));
                } else if (dragged === 'drop') {
                    if (check(tubeA)) setStatus(s => ({...s, iodineA: true}));
                    if (check(tubeB)) setStatus(s => ({...s, iodineB: true}));
                }
                setIsDragging(false);
            };

            return (
                <div onMouseMove={onMove} onTouchMove={onMove} onMouseUp={onEnd} onTouchEnd={onEnd} className="h-screen w-full flex flex-col p-4 md:p-8 select-none overflow-hidden">
                    <header className="flex justify-between items-center mb-8">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/40"><SvgIcon type="beaker" /></div>
                            <h1 className="text-xl md:text-2xl font-black italic tracking-tighter">VIBE LAB <span className="text-blue-500 text-xs not-italic font-normal">v2.0</span></h1>
                        </div>
                        <div className="glass px-6 py-3 rounded-2xl hidden md:block">
                            <span className="text-blue-400 font-bold mr-3">{steps[step].t}</span>
                            <span className="text-slate-400 text-sm">{steps[step].d}</span>
                        </div>
                    </header>

                    <div className="flex-1 flex flex-col lg:flex-row gap-8 min-h-0">
                        <div className="flex-[2] glass rounded-[3rem] relative flex items-center justify-center gap-16 md:gap-32 overflow-hidden border border-white/5 shadow-inner">
                            {/* 도구함 */}
                            <div className="absolute top-8 left-8 flex flex-col gap-4 z-20">
                                {step === 0 && (
                                    <>
                                        {!status.a && <div onMouseDown={() => {setIsDragging(true); setDragged('plant');}} className="w-16 h-16 glass rounded-2xl flex items-center justify-center cursor-grab active:scale-90 hover:bg-slate-700/50 transition-all"><SvgIcon type="plant" /></div>}
                                        {!status.foil && <div onMouseDown={() => {setIsDragging(true); setDragged('foil');}} className="w-16 h-16 glass rounded-2xl flex items-center justify-center cursor-grab active:scale-90 hover:bg-slate-700/50 transition-all"><div className="w-10 h-8 bg-slate-500 rounded-md" /></div>}
                                    </>
                                )}
                                {step === 2 && (
                                    <div onMouseDown={() => {setIsDragging(true); setDragged('drop');}} className="w-16 h-16 glass rounded-2xl flex items-center justify-center cursor-grab active:scale-90 hover:bg-slate-700/50 transition-all text-blue-400"><SvgIcon type="drop" /></div>
                                )}
                            </div>

                            {/* 시험관 A */}
                            <div id="tube-a" className="relative group">
                                <div className="w-16 md:w-20 h-64 md:h-80 bg-white/5 border-2 border-white/20 rounded-b-full relative overflow-hidden">
                                    <div className="absolute bottom-0 w-full h-4/5 tube-liquid" />
                                    {status.a && <div className={`absolute bottom-4 left-1/2 -translate-x-1/2 w-4 md:w-6 h-48 md:h-60 rounded-t-full transition-colors duration-1000 ${status.iodineA ? 'bg-indigo-900' : 'bg-green-500'}`} />}
                                    {status.a && step === 1 && (
                                        <>
                                            <div className="bubble-anim absolute bottom-20 left-1/3 w-2 h-2 bg-white/60 rounded-full" />
                                            <div className="bubble-anim absolute bottom-10 left-2/3 w-3 h-3 bg-white/40 rounded-full" style={{animationDelay:'0.5s'}} />
                                        </>
                                    )}
                                    {status.iodineA && <div className="absolute inset-0 bg-indigo-900/40" />}
                                </div>
                                <div className="text-center mt-4 font-bold text-slate-400">시험관 A (빛)</div>
                            </div>

                            {/* 시험관 B */}
                            <div id="tube-b" className="relative">
                                <div className="w-16 md:w-20 h-64 md:h-80 bg-white/5 border-2 border-white/20 rounded-b-full relative overflow-hidden">
                                    <div className="absolute bottom-0 w-full h-4/5 tube-liquid" />
                                    {status.b && <div className={`absolute bottom-4 left-1/2 -translate-x-1/2 w-4 md:w-6 h-48 md:h-60 rounded-t-full transition-colors duration-1000 ${status.iodineB ? 'bg-slate-300' : 'bg-green-600'}`} />}
                                    {status.foil && step === 0 && <div className="absolute inset-0 bg-slate-700 z-10 border-2 border-slate-500 flex items-center justify-center font-black text-[10px] -rotate-90">FOIL</div>}
                                    {status.iodineB && <div className="absolute inset-0 bg-amber-900/20" />}
                                </div>
                                <div className="text-center mt-4 font-bold text-slate-400">시험관 B (어둠)</div>
                            </div>

                            {/* 드래그 물체 */}
                            {isDragging && (
                                <div className="fixed pointer-events-none z-[100] scale-125" style={{left: pos.x, top: pos.y, transform: 'translate(-50%, -50%)'}}>
                                    {dragged === 'plant' && <div className="w-4 h-24 bg-green-500 rounded-full border-2 border-white shadow-[0_0_20px_rgba(34,197,94,0.5)]" />}
                                    {dragged === 'foil' && <div className="w-20 h-16 bg-slate-500 border-2 border-white rounded-lg" />}
                                    {dragged === 'drop' && <div className="text-blue-500"><SvgIcon type="drop" /></div>}
                                </div>
                            )}
                        </div>

                        {/* 사이드 제어판 */}
                        <div className="flex-1 flex flex-col gap-6">
                            <div className="glass rounded-[2.5rem] p-8 flex flex-col justify-between">
                                <div>
                                    <h2 className="text-blue-400 font-black text-lg mb-6 tracking-widest uppercase">Console</h2>
                                    <div className="space-y-4">
                                        <div className="bg-white/5 p-4 rounded-2xl border border-white/5">
                                            <p className="text-xs text-slate-500 mb-1 font-bold">CURRENT TASK</p>
                                            <p className="text-sm text-slate-200">{steps[step].d}</p>
                                        </div>
                                        {step === 1 && (
                                            <div className="bg-blue-500/10 p-4 rounded-2xl border border-blue-500/20 animate-pulse">
                                                <p className="text-sm text-blue-300">💡 빛을 받은 잎에서는 광합성이 일어나 산소 기포가 발생합니다.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <button 
                                    onClick={() => step < 2 && setStep(s => s + 1)}
                                    className="w-full mt-10 py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black flex items-center justify-center gap-3 transition-all shadow-xl shadow-blue-500/20 active:scale-95"
                                >
                                    {step === 2 ? "실험 다시하기" : "다음 단계 진행"} <SvgIcon type="play" />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
