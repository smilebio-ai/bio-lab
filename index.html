<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광합성 가상 실험실 - 현미경 특화 버전</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #f1f5f9; color: #1e293b; margin: 0; touch-action: none; }
        
        /* 현미경 렌즈 효과 */
        .microscope-lens {
            width: 320px; height: 320px;
            border-radius: 50%;
            border: 12px solid #0f172a;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            background: #fff;
        }
        .microscope-lens::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
        }

        /* 식물 세포 벽(Plant Cell) 스타일 */
        .plant-cell {
            border: 1px solid rgba(0,0,0,0.1);
            position: relative;
            display: flex; flex-wrap: wrap; gap: 2px; padding: 4px;
            background: rgba(255,255,255,0.5);
        }

        /* 엽록체(Chloroplast) 스타일 */
        .chloroplast {
            width: 6px; height: 6px; border-radius: 50%;
            transition: all 1s ease;
        }

        .glass-ui { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.4); }
        @keyframes drift { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(2px, 2px); } }
        .cell-drift { animation: drift 4s infinite ease-in-out; }
    </style>
</head>
