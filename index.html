<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>광합성 실험실 - 안정 버전</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <p class="text-slate-400 animate-pulse font-bold">실험실 장비를 준비 중입니다...</p>
        </div>
    </div>

    <script type="text/babel">
        // 로딩 완료 후 실행되도록 보장
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // 여기에 아까 드린 고퀄리티 버전의 App 내부 코드를 그대로 넣으면 됩니다.
            // 하지만 안전을 위해 아주 간단한 테스트 문구부터 띄워볼게요.
            return (
                <div class="p-10 text-center">
                    <h1 class="text-4xl font-bold text-blue-600">실험실 정상 작동 중!</h1>
                    <p class="mt-4 text-slate-500">이 문구가 보인다면 이제 전체 코드를 넣으셔도 됩니다.</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
