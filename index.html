<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광합성 가상 실험실</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 아이콘 컴포넌트 래퍼 (Lucide 아이콘을 React에서 쓰기 위함)
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [step, setStep] = useState(0);
            const [viewMode, setViewMode] = useState('bench');
            const [isDragging, setIsDragging] = useState(false);
            const [draggedItem, setDraggedItem] = useState(null); 
            const [toolPos, setToolPos] = useState({ x: 0, y: 0 });
            
            const [elodeaInA, setElodeaInA] = useState(false);
            const [elodeaInB, setElodeaInB] = useState(false);
            const [foilOnB, setFoilOnB] = useState(false);
            const [incenseStatus, setIncenseStatus] = useState('normal'); 
            const [appliedIodineA, setAppliedIodineA] = useState(false);
            const [appliedIodineB, setAppliedIodineB] = useState(false);
            const [isDropping, setIsDropping] = useState(false);
            
            const containerRef = useRef(null);
            const tubeARef = useRef(null);
            const tubeBRef = useRef(null);

            const steps = [
                { title: "실험 준비", desc: "검정말을 드래그하여 시험관 A, B에 넣고, 시험관 B는 알루미늄 호일로 감싸 빛을 차단하세요." },
                { title: "향불 테스트", desc: "향불 끝을 시험관 입구 근처로 가져가 변화를 관찰해 보세요." },
                { title: "탈색 과정", desc: "에탄올이 든 비커에 잎을 넣고 중탕하여 엽록소를 제거합니다. (잎이 하얗게 변합니다)" },
                { title: "아이오딘 반응", desc: "스포이트를 드래그하여 각 시험관에 아이오딘 용액을 떨어뜨려 보세요." },
                { title: "현미경 관찰", desc: "세포 속에 나타난 변화를 관찰하고 결과를 해석해 봅시다." }
            ];

            useEffect(() => {
                const handleMove = (e) => {
                    if (!isDragging || !containerRef.current) return;
                    const rect = containerRef.current.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    const x = clientX - rect.left;
                    const y = clientY - rect.top;
                    setToolPos({ x, y });

                    const checkCollision = (ref) => {
                        if (!ref.current) return false;
                        const tubeRect = ref.current.getBoundingClientRect();
                        const relativeTubeX = tubeRect.left - rect.left + tubeRect.width / 2;
                        let relativeTargetY = (tubeRect.top - rect.top + tubeRect.height / 2);
                        if (step === 1) relativeTargetY = (tubeRect.top - rect.top) - 48;
                        else if (step === 3) relativeTargetY = (tubeRect.top - rect.top);
                        
                        const dist = Math.sqrt(Math.pow(x - relativeTubeX, 2) + Math.pow((step === 1 ? y-120 : y) - relativeTargetY, 2));
                        return dist < (step === 0 ? 90 : 55); 
                    };

                    if (step === 0) {
                        if (draggedItem === 'elodea') {
                            if (checkCollision(tubeARef)) setElodeaInA(true);
                            if (checkCollision(tubeBRef)) setElodeaInB(true);
                        } else if (draggedItem === 'foil') {
                            if (checkCollision(tubeBRef)) setFoilOnB(true);
                        }
                    } else if (step === 1 && draggedItem === 'incense') {
                        if (checkCollision(tubeARef)) setIncenseStatus('bright');
                        else if (checkCollision(tubeBRef)) setIncenseStatus('off');
                        else setIncenseStatus('normal');
                    } else if (step === 3 && draggedItem === 'iodine') {
                        if (checkCollision(tubeARef)) {
                            setIsDropping(true);
                            setTimeout(() => setAppliedIodineA(true), 300);
                        } else if (checkCollision(tubeBRef)) {
                            setIsDropping(true);
                            setTimeout(() => setAppliedIodineB(true), 300);
                        }
                    }
                };

                const handleEnd = () => { setIsDragging(false); setIsDropping(false); setDraggedItem(null); };
                if (isDragging) {
                    window.addEventListener('mousemove', handleMove);
                    window.addEventListener('mouseup', handleEnd);
                }
                return () => {
                    window.removeEventListener('mousemove', handleMove);
                    window.removeEventListener('mouseup', handleEnd);
                };
            }, [isDragging, draggedItem, step]);

            const onDragStart = (e, itemType) => {
                const rect = containerRef.current.getBoundingClientRect();
                setIsDragging(true);
                setDraggedItem(itemType);
                setToolPos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
            };

            const Dropper = ({ isAnimate }) => (
                <div className={`relative flex flex-col items-center ${isAnimate ? 'scale-110' : ''}`}>
                    <div className="w-6 h-7 bg-red-600 rounded-t-full shadow-md"></div>
                    <div className="w-6 h-1 bg-slate-400"></div>
                    <div className="w-2.5 h-20 bg-slate-200/40 border-x border-slate-300 relative overflow-hidden flex flex-col justify-end">
                        <div className="w-full h-1/2 bg-amber-600 opacity-80"></div>
                    </div>
                </div>
            );

            const TestTube = ({ label, hasElodea, isCovered, resultType, isBleached, isIodined, refProp }) => (
                <div className="flex flex-col items-center mx-12 relative" ref={refProp}>
                    <div className="relative w-14 h-52 bg-blue-100/30 border-2 border-slate-300 rounded-b-full overflow-hidden">
                        <div className="absolute bottom-0 w-full h-4/5 bg-blue-200/50"></div>
                        {hasElodea && (
                            <div className={`absolute bottom-4 left-1/2 -translate-x-1/2 w-4 h-36 transition-all duration-1000 ${isBleached ? (isIodined && resultType === 'A' ? 'bg-indigo-950' : 'bg-slate-100') : 'bg-green-600'} rounded-t-full`}></div>
                        )}
                        {isCovered && step === 0 && (
                            <div className="absolute inset-0 bg-slate-600 z-10 flex items-center justify-center border-2 border-slate-400">
                                <span className="text-white text-[10px] font-bold -rotate-90">HOIL</span>
                            </div>
                        )}
                        {isIodined && <div className={`absolute inset-0 ${resultType === 'A' ? 'bg-indigo-900/40' : 'bg-amber-700/20'}`}></div>}
                    </div>
                    <div className="mt-3 font-bold text-slate-700 bg-white px-3 py-1 rounded-full shadow-sm text-sm">시험관 {label}</div>
                </div>
            );

            return (
                <div className="flex flex-col min-h-screen bg-slate-50 p-4 select-none">
                    <div className="mb-6 text-center">
                        <h1 className="text-3xl font-bold text-slate-800 flex items-center justify-center gap-2">
                            <Icon name="beaker" className="text-blue-500 w-8 h-8" /> 광합성 가상 실험실
                        </h1>
                    </div>

                    <div className="flex flex-col lg:flex-row gap-6 max-w-6xl mx-auto w-full">
                        <div ref={containerRef} className="flex-[3] bg-white rounded-3xl shadow-xl p-8 flex flex-col items-center justify-center relative border border-slate-100 min-h-[500px]">
                            {viewMode === 'bench' ? (
                                <>
                                    <div className="flex gap-4 absolute left-4 top-4">
                                        {step === 0 && (
                                            <>
                                                <button onMouseDown={(e) => onDragStart(e, 'elodea')} className="bg-green-50 p-4 rounded-2xl border-2 border-green-200"><Icon name="layers" className="text-green-500" /></button>
                                                <button onMouseDown={(e) => onDragStart(e, 'foil')} className="bg-slate-50 p-4 rounded-2xl border-2 border-slate-200"><Icon name="square" className="text-slate-400" /></button>
                                            </>
                                        )}
                                        {step === 1 && <button onMouseDown={(e) => onDragStart(e, 'incense')} className="bg-orange-50 p-4 rounded-2xl border-2 border-orange-200"><Icon name="flame" className="text-orange-500" /></button>}
                                        {step === 3 && <button onMouseDown={(e) => onDragStart(e, 'iodine')} className="bg-amber-50 p-4 rounded-2xl border-2 border-amber-200"><Icon name="droplet" className="text-amber-500" /></button>}
                                    </div>
                                    <div className="flex items-end justify-center w-full h-64">
                                        <TestTube label="A" hasElodea={elodeaInA} isBleached={step >= 2} isIodined={appliedIodineA} resultType="A" refProp={tubeARef} />
                                        <TestTube label="B" hasElodea={elodeaInB} isCovered={foilOnB} isBleached={step >= 2} isIodined={appliedIodineB} resultType="B" refProp={tubeBRef} />
                                    </div>
                                    {isDragging && (
                                        <div className="absolute pointer-events-none z-50" style={{ left: toolPos.x, top: toolPos.y, transform: 'translate(-50%, -50%)' }}>
                                            {draggedItem === 'elodea' && <div className="w-4 h-16 bg-green-600 rounded-full border-2 border-white shadow-xl"></div>}
                                            {draggedItem === 'foil' && <div className="w-16 h-12 bg-slate-400 border-2 border-white shadow-xl"></div>}
                                            {draggedItem === 'incense' && <div className={`w-1.5 h-32 bg-amber-800 border-t-4 border-red-500 ${incenseStatus === 'bright' ? 'shadow-[0_0_20px_orange]' : ''}`}></div>}
                                            {draggedItem === 'iodine' && <Dropper isAnimate={true} />}
                                        </div>
                                    )}
                                </>
                            ) : (
                                <div className="flex gap-10">
                                    <div className="w-64 h-64 rounded-full border-8 border-slate-800 bg-indigo-900/20 flex items-center justify-center font-bold">A (청람색)</div>
                                    <div className="w-64 h-64 rounded-full border-8 border-slate-800 bg-amber-700/10 flex items-center justify-center font-bold">B (변화없음)</div>
                                </div>
                            )}
                        </div>

                        <div className="flex-1 bg-slate-900 text-white rounded-3xl p-6 shadow-2xl">
                            <h2 className="text-xl font-bold mb-4 text-blue-400 border-b border-slate-700 pb-2">실험 가이드</h2>
                            <div className="bg-slate-800 p-4 rounded-xl mb-6">
                                <h3 className="text-blue-300 font-bold text-sm mb-1">{steps[step].title}</h3>
                                <p className="text-sm text-slate-300">{steps[step].desc}</p>
                            </div>
                            <button 
                                onClick={() => step < 4 && setStep(step + 1)}
                                className={`w-full py-4 rounded-xl font-bold transition-all ${step === 4 ? 'bg-slate-700' : 'bg-blue-600 hover:bg-blue-500'}`}
                            >
                                다음 단계로
                            </button>
                            {step === 4 && (
                                <button onClick={() => setViewMode(viewMode === 'bench' ? 'micro' : 'bench')} className="w-full mt-4 py-4 bg-emerald-600 rounded-xl font-bold">
                                    {viewMode === 'bench' ? '현미경 관찰' : '실험대 보기'}
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
