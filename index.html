<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광합성 가상 실험실 Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .tube-gradient { background: linear-gradient(180deg, rgba(219, 234, 254, 0.4) 0%, rgba(191, 219, 254, 0.8) 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 고퀄리티 SVG 아이콘 컴포넌트
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                beaker: <path d="M4.5 3h15M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3M6 14h12" />,
                layers: <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.59-3.91a1 1 0 0 0 .58-.91 M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.59-3.91a1 1 0 0 0 .58-.91" />,
                flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" />,
                droplet: <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5s-3 3.5-3 5.5a7 7 0 0 0 7 7z" />,
                play: <polygon points="5 3 19 12 5 21 5 3" />,
                refresh: <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8 M21 3v5h-5 M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16 M3 21v-5h5" />
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [step, setStep] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const [draggedItem, setDraggedItem] = useState(null);
            const [toolPos, setToolPos] = useState({ x: 0, y: 0 });
            
            // 실험 상태
            const [elodeaA, setElodeaA] = useState(false);
            const [elodeaB, setElodeaB] = useState(false);
            const [foilB, setFoilB] = useState(false);
            const [incenseResult, setIncenseResult] = useState('normal'); 
            const [iodineA, setIodineA] = useState(false);
            const [iodineB, setIodineB] = useState(false);

            const containerRef = useRef(null);
            const tubeARef = useRef(null);
            const tubeBRef = useRef(null);

            const steps = [
                { title: "실험 준비", desc: "검정말을 드래그하여 시험관 A, B에 넣고, B는 알루미늄 호일로 감싸세요." },
                { title: "향불 테스트", desc: "향불을 가져가 광합성으로 발생한 산소를 확인해 보세요." },
                { title: "탈색 및 아이오딘 반응", desc: "엽록소를 제거한 잎에 아이오딘 용액을 떨어뜨려 녹말 형성을 확인합니다." }
            ];

            useEffect(() => {
                const handleMove = (e) => {
                    if (!isDragging) return;
                    const rect = containerRef.current.getBoundingClientRect();
                    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                    setToolPos({ x, y });

                    const checkHit = (ref) => {
                        const tRect = ref.current.getBoundingClientRect();
                        const tx = tRect.left - rect.left + tRect.width/2;
                        const ty = tRect.top - rect.top + tRect.height/2;
                        return Math.sqrt(Math.pow(x-tx,2) + Math.pow(y-ty,2)) < 60;
                    };

                    if (step === 0) {
                        if (draggedItem === 'plant') {
                            if (checkHit(tubeARef)) setElodeaA(true);
                            if (checkHit(tubeBRef)) setElodeaB(true);
                        } else if (draggedItem === 'foil' && checkHit(tubeBRef)) setFoilB(true);
                    } else if (step === 1 && draggedItem === 'fire') {
                        if (checkHit(tubeARef)) setIncenseResult('bright');
                        else if (checkHit(tubeBRef)) setIncenseResult('dim');
                    } else if (step === 2 && draggedItem === 'drop') {
                        if (checkHit(tubeARef)) setIodineA(true);
                        else if (checkHit(tubeBRef)) setIodineB(true);
                    }
                };
                const endDrag = () => setIsDragging(false);
                window.addEventListener('mousemove', handleMove);
                window.addEventListener('mouseup', endDrag);
                return () => { window.removeEventListener('mousemove', handleMove); window.removeEventListener('mouseup', endDrag); };
            }, [isDragging, draggedItem, step]);

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <header className="max-w-5xl w-full mb-8 flex justify-between items-center">
                        <div>
